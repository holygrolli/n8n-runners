name: Build and Push Custom n8n-runner Image

on:
  schedule:
    - cron: '0 2 * * *' # Run daily at 2:00 AM
  workflow_dispatch:
    inputs:
      version:
        description: 'Version of n8n to build (e.g. 2.7.5). If left empty, the latest stable release will be used.'
        required: false
        type: string

jobs:
  build:
    name: Build Multi-arch Image
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get n8n stable version
        id: get_version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
            echo "Using provided manual version: $VERSION"
          else
            # Fetch the release JSON from the 'stable' tag
            RELEASE_JSON=$(curl -sL -H "Accept: application/vnd.github.v3+json" https://api.github.com/repos/n8n-io/n8n/releases/tags/stable | tr -d '\000-\037')
            # Use only 'target_commitish' to determine the version
            TARGET_COMMITISH=$(echo "$RELEASE_JSON" | jq -r '.target_commitish // empty')
            if [ -z "$TARGET_COMMITISH" ]; then
              echo "Error: target_commitish not present in release JSON"
              exit 1
            fi
            # Normalize and extract the 2.x.y version from target_commitish
            VERSION=$(echo "$TARGET_COMMITISH" | sed -E 's/^n8n@?//;s/^v//;s#^refs/heads/##')
            VERSION=$(echo "$VERSION" | grep -oE '2\.[0-9]+\.[0-9]+' | head -n1)

            if [ -z "$VERSION" ]; then
              echo "Error: Could not extract 2.x.y version from target_commitish: $TARGET_COMMITISH"
              exit 1
            fi
            echo "Found stable version: $VERSION"
          fi
          echo "N8N_VERSION=$VERSION" >> $GITHUB_ENV
          
          if git ls-remote --tags origin | grep -q "refs/tags/${VERSION}$"; then
            echo "Tag ${VERSION} already exists. Skipping build."
            echo "SKIP_BUILD=true" >> $GITHUB_ENV
          else
            echo "Tag ${VERSION} does not exist. Proceeding with build."
            echo "SKIP_BUILD=false" >> $GITHUB_ENV
          fi

      - name: Set up QEMU
        if: env.SKIP_BUILD != 'true'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: env.SKIP_BUILD != 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry (GHCR)
        if: env.SKIP_BUILD != 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        if: env.SKIP_BUILD != 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            N8N_VERSION=${{ env.N8N_VERSION }}
          tags: ghcr.io/${{ github.repository_owner }}/n8n-runners:${{ env.N8N_VERSION }}

      - name: Create and push git tag
        if: env.SKIP_BUILD != 'true'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          TAG_NAME="${{ env.N8N_VERSION }}"
          if git ls-remote --tags origin | grep -q "refs/tags/${TAG_NAME}$"; then
            echo "Tag ${TAG_NAME} already exists. Skipping."
          else
            git tag -a "${TAG_NAME}" -m "Release ${TAG_NAME}"
            git push origin "${TAG_NAME}"
          fi
